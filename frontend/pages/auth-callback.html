<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Signing you in… — KaziX</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#F5F0E8;color:#0D0D0D;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:white;border-radius:8px;padding:3rem 2.5rem;text-align:center;max-width:420px;width:90%;box-shadow:0 4px 40px rgba(0,0,0,0.06)}
  .icon{font-size:3rem;margin-bottom:1rem}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:-0.04em;margin-bottom:0.5rem}
  p{font-size:0.9rem;color:#7A7468;line-height:1.6}
  .spinner{width:40px;height:40px;border:3px solid #E0DDD6;border-top-color:#0D0D0D;border-radius:50%;animation:spin 0.7s linear infinite;margin:1.5rem auto 0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error{color:#C0392B;font-weight:600;margin-top:1rem;font-size:0.85rem}
  .btn{display:inline-block;margin-top:1.5rem;padding:0.75rem 1.75rem;background:#0D0D0D;color:#F5F0E8;font-family:'Syne',sans-serif;font-weight:700;font-size:0.875rem;border-radius:2px;text-decoration:none}
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">✉️</div>
  <h1 id="title">Signing you in…</h1>
  <p id="sub">Please wait while we confirm your identity.</p>
  <div class="spinner" id="spinner"></div>
  <div class="error" id="errMsg" style="display:none"></div>
  <a href="register.html" class="btn" id="retryBtn" style="display:none">Back to Registration</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../env.js"></script>
<script>
function redirectDevOriginToLocalhost() {
  if (window.location.hostname !== '0.0.0.0') return false;
  const url = new URL(window.location.href);
  url.hostname = 'localhost';
  window.location.replace(url.toString());
  return true;
}

const isCanonicalRedirectPending = redirectDevOriginToLocalhost();
function resolveApiBase() {
  const configured = String(window.KAZIX_API_BASE || window.KAZIX_CONFIG?.KAZIX_API_BASE || '').trim();
  const host = window.location.hostname;
  const proxyHosts = new Set([
    'kazixfrontend.vercel.app',
    'kazix.vercel.app',
    'kazix.co.ke',
    'www.kazix.co.ke',
  ]);
  const useSameOriginProxy = proxyHosts.has(host) || host.endsWith('.kazix.co.ke');

  if (configured) {
    try {
      const configuredUrl = new URL(configured, window.location.origin);
      if (configuredUrl.origin === window.location.origin && configuredUrl.pathname === '/') {
        return '';
      }
      return configuredUrl.toString().replace(/\/$/, '');
    } catch (_error) {
      return configured.replace(/\/$/, '');
    }
  }

  if (useSameOriginProxy) {
    return '';
  }

  return window.location.origin.replace(/\/$/, '');
}

const API_BASE = resolveApiBase();
const API_BASE_LABEL = API_BASE || window.location.origin;
const SUPABASE_URL = window.SUPABASE_URL || window.KAZIX_CONFIG?.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || window.KAZIX_CONFIG?.SUPABASE_ANON_KEY;
const initialSearchParams = new URLSearchParams(window.location.search);
const initialHashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
const authFlow = initialSearchParams.get('flow') || localStorage.getItem('kazix_auth_flow') || 'register';
const AUTH_WAITER_SESSION_KEY = 'kazix_auth_waiter_id';
const AUTH_WAITING_OWNER_KEY = 'kazix_auth_waiting_owner';
const AUTH_WAITING_FLOW_KEY = 'kazix_auth_waiting_flow';
const AUTH_WAITING_HEARTBEAT_KEY = 'kazix_auth_waiting_heartbeat';
const AUTH_WAITING_MAX_AGE_MS = 30000;
const SUPABASE_CONFIG_ERROR = !window.supabase
  ? 'Supabase browser client failed to load. Refresh the page and try again.'
  : (!SUPABASE_URL || !SUPABASE_ANON_KEY
      ? 'Missing Supabase configuration. Generate frontend/env.js from frontend/.env and include it before page scripts.'
      : null);
const supabaseClient = SUPABASE_CONFIG_ERROR
  ? null
  : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: false },
    });

function toDisplayError(err, fallback) {
  const message = err?.message?.trim();
  if (message === 'Failed to fetch') {
    return `Cannot reach API at ${API_BASE_LABEL}. Start the FastAPI app and, if you are using a separate frontend origin, ensure ALLOWED_ORIGINS includes ${window.location.origin}.`;
  }
  return message || fallback;
}

function summarizeResponseText(text) {
  return text.replace(/\s+/g, ' ').trim().slice(0, 240);
}

async function readApiResponse(resp) {
  const text = await resp.text();
  if (!text) return null;

  try {
    return JSON.parse(text);
  } catch (_error) {
    if (!resp.ok) {
      return {
        detail: summarizeResponseText(text) || `Request failed with ${resp.status} ${resp.statusText}.`,
      };
    }
    throw new Error('The server returned an unexpected response.');
  }
}

function getRetryConfig(flow) {
  return flow === 'login'
    ? { href: 'login.html', label: 'Back to Sign In' }
    : { href: 'register.html', label: 'Back to Registration' };
}

function configureFlowUi(flow) {
  const retry = getRetryConfig(flow);
  const retryBtn = document.getElementById('retryBtn');
  retryBtn.href = retry.href;
  retryBtn.textContent = retry.label;
  document.getElementById('title').textContent = 'Signing you in…';
  document.getElementById('sub').textContent = flow === 'login'
    ? 'Please wait while we confirm your email sign-in.'
    : 'Please wait while we confirm your identity.';
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('icon').textContent = '❌';
  document.getElementById('title').textContent  = 'Something went wrong';
  document.getElementById('sub').textContent    = msg;
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('retryBtn').style.display = 'inline-block';
}

function getCallbackParam(name) {
  return initialSearchParams.get(name) || initialHashParams.get(name);
}

function clearCallbackUrl() {
  if (!window.location.search && !window.location.hash) return;
  window.history.replaceState({}, document.title, window.location.pathname);
}

async function getCurrentSession() {
  const { data, error } = await supabaseClient.auth.getSession();
  if (error) throw error;
  return data?.session || null;
}

async function waitForSession(timeoutMs = 5000) {
  return new Promise((resolve, reject) => {
    let settled = false;
    let subscription;

    const finish = (callback, value) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      subscription?.unsubscribe();
      callback(value);
    };

    const timer = setTimeout(async () => {
      try {
        const session = await getCurrentSession();
        if (session) {
          finish(resolve, session);
          return;
        }
        console.error('[waitForSession] No session found on timeout');
        finish(reject, new Error('No session received — the link may have already been used.'));
      } catch (error) {
        console.error('[waitForSession] Error on timeout:', error);
        finish(reject, error);
      }
    }, timeoutMs);

    const { data } = supabaseClient.auth.onAuthStateChange((_event, session) => {
      if (session) {
        finish(resolve, session);
      }
    });
    subscription = data.subscription;
  });
}

async function resolveSessionFromCallback() {
  const accessToken = getCallbackParam('access_token');
  const refreshToken = getCallbackParam('refresh_token');
  if (accessToken && refreshToken) {
    const { data, error } = await supabaseClient.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });
    if (error) throw error;
    if (!data?.session) throw new Error('No session returned from the email sign-in link.');
    return data.session;
  }

  const code = initialSearchParams.get('code');
  if (code) {
    const { data, error } = await supabaseClient.auth.exchangeCodeForSession(code);
    if (error) throw error;
    if (!data?.session) throw new Error('No session returned from the sign-in code.');
    return data.session;
  }

  const tokenHash = getCallbackParam('token_hash');
  const type = getCallbackParam('type');
  if (tokenHash && type) {
    const { data, error } = await supabaseClient.auth.verifyOtp({
      token_hash: tokenHash,
      type,
    });
    if (error) throw error;
    if (!data?.session) throw new Error('No session returned from the magic link.');
    return data.session;
  }

  const sessionFromStorage = await getCurrentSession();
  if (sessionFromStorage) return sessionFromStorage;
  return waitForSession();
}

function persistSession(session) {
  const expiresIn = Number.isFinite(session.expires_in)
    ? session.expires_in
    : (typeof session.expires_at === 'number'
        ? Math.max(0, session.expires_at - Math.floor(Date.now() / 1000))
        : null);
  const expiresAt = Number.isFinite(session.expires_at)
    ? Math.floor(session.expires_at)
    : (expiresIn !== null
        ? Math.floor(Date.now() / 1000) + Math.floor(expiresIn)
        : null);

  localStorage.setItem('kazix_access_token', session.access_token);
  localStorage.setItem('kazix_refresh_token', session.refresh_token);
  if (expiresIn !== null) {
    localStorage.setItem('kazix_expires_in', String(expiresIn));
  } else {
    localStorage.removeItem('kazix_expires_in');
  }
  if (expiresAt !== null) {
    localStorage.setItem('kazix_expires_at', String(expiresAt));
  } else {
    localStorage.removeItem('kazix_expires_at');
  }
  localStorage.setItem('kazix_token_type', session.token_type || 'bearer');
}

async function bootstrapSession(session) {
  const resp = await fetch(`${API_BASE}/v1/auth/bootstrap`, {
    method: 'GET',
    headers: {
      Authorization: `Bearer ${session.access_token}`,
    },
  });
  const data = await readApiResponse(resp);
  if (!resp.ok) throw new Error(data?.detail || 'Could not finish sign-in.');
  return data;
}

function mapRedirectToPage(redirectTo, flow) {
  if (redirectTo === 'complete-registration') {
    return flow === 'register' ? 'register.html?step=4' : 'register.html';
  }

  const map = {
    'client-dashboard': 'client-dashboard.html',
    'fundi-dashboard': 'worker-dashboard.html',
    'admin-dashboard': 'admin-dashboard.html',
  };
  return map[redirectTo] || 'index.html';
}

function getSuccessMessage(nextPage, flow) {
  if (nextPage.startsWith('register.html')) {
    return flow === 'register'
        ? 'Redirecting you back to finish your profile...'
        : 'Redirecting you to complete your account...';
  }
  return 'Redirecting you to your dashboard…';
}

function shouldHandOffToOriginalTab(flow) {
  const owner = localStorage.getItem(AUTH_WAITING_OWNER_KEY);
  const waitingFlow = localStorage.getItem(AUTH_WAITING_FLOW_KEY);
  const heartbeat = Number(localStorage.getItem(AUTH_WAITING_HEARTBEAT_KEY));
  const sameTabWaiterId = sessionStorage.getItem(AUTH_WAITER_SESSION_KEY);

  if (!owner || !Number.isFinite(heartbeat)) return false;
  if (sameTabWaiterId && sameTabWaiterId === owner) return false;
  if (waitingFlow && waitingFlow !== flow) return false;
  if ((Date.now() - heartbeat) > AUTH_WAITING_MAX_AGE_MS) return false;
  return true;
}

function handOffToOriginalTab(nextPage, flow) {
  const retryBtn = document.getElementById('retryBtn');
  document.getElementById('sub').textContent = flow === 'login'
    ? 'Your original KaziX tab is finishing sign-in now. You can return to it and close this tab.'
    : 'Your original KaziX tab is finishing registration now. You can return to it and close this tab.';
  retryBtn.href = nextPage;
  retryBtn.textContent = 'Continue Here';
  retryBtn.style.display = 'inline-block';

  setTimeout(() => {
    try {
      window.close();
    } catch (_error) {
      // Ignore close failures; the button above is the fallback.
    }
  }, 400);
}

function handOffViaWindowOpener(session, bootstrap, flow) {
  /**
   * Direct method: if this tab was opened from another (via email/magic link click),
   * communicate directly with window.opener to set the session there, then close this tab.
   * This avoids relying on localStorage heartbeat timing and is more reliable.
   */
  if (!window.opener) return false;

  try {
    const nextPage = mapRedirectToPage(bootstrap.redirect_to, flow);
    const expiresAt = Number.isFinite(session.expires_at)
      ? Math.floor(session.expires_at)
      : (Number.isFinite(session.expires_in)
          ? Math.floor(Date.now() / 1000) + Math.floor(session.expires_in)
          : null);
    
    // Inject session and auth state into the opening window
    window.opener.localStorage.setItem('kazix_access_token', session.access_token);
    window.opener.localStorage.setItem('kazix_refresh_token', session.refresh_token);
    if (session.expires_in !== null) {
      window.opener.localStorage.setItem('kazix_expires_in', String(session.expires_in));
    }
    if (expiresAt !== null) {
      window.opener.localStorage.setItem('kazix_expires_at', String(expiresAt));
    }
    window.opener.localStorage.setItem('kazix_token_type', session.token_type || 'bearer');
    
    // Signal the original tab to redirect
    window.opener.localStorage.setItem('kazix_magic_link_complete', '1');
    window.opener.localStorage.setItem('kazix_auth_next_page', nextPage);
    window.opener.localStorage.setItem('kazix_auth_flow', flow);
    
    // Show success message in this tab
    document.getElementById('icon').textContent  = '✅';
    document.getElementById('title').textContent = flow === 'login' ? "You're signed in!" : 'Email confirmed!';
    document.getElementById('sub').textContent   = 'Returning you to your original tab...';
    document.getElementById('spinner').style.display = 'none';
    
    // Close this tab after a brief delay
    setTimeout(() => {
      try {
        window.close();
      } catch (_error) {
        // Ignore — if we can't close, the user can close manually
      }
    }, 600);
    
    return true;
  } catch (error) {
    console.warn('Window opener handoff failed:', error);
    return false;
  }
}

async function handleCallback() {
  // ── 1. Check for error params in the callback URL first ──────────────────
  const urlError = getCallbackParam('error');
  const urlErrorCode = getCallbackParam('error_code');
  const urlErrorDesc = getCallbackParam('error_description');

  if (urlError) {
    clearCallbackUrl();
    document.getElementById('spinner').style.display = 'none';
    if (urlErrorCode === 'otp_expired') {
      document.getElementById('icon').textContent  = '⏰';
      document.getElementById('title').textContent = 'Link expired';
      document.getElementById('sub').textContent   =
        authFlow === 'login'
          ? 'Email sign-in links expire after a short time. Go back and request a fresh one.'
          : 'Magic links expire after a short time. Go back and request a fresh one.';
      document.getElementById('retryBtn').textContent  = 'Request a new link';
      document.getElementById('retryBtn').style.display = 'inline-block';
    } else {
      showError(
        urlErrorDesc
          ? decodeURIComponent(urlErrorDesc.replace(/\+/g, ' '))
          : 'The email link is invalid. Please request a new one.'
      );
    }
    return;
  }

  clearCallbackUrl();

  // ── 2. No error — recover the session using the current v2 APIs ──────────
  try {
    const session = await resolveSessionFromCallback();
    if (!session) throw new Error('No session returned. The link may be invalid or already used.');
    persistSession(session);
    
    const bootstrap = await bootstrapSession(session);
    const nextPage = mapRedirectToPage(bootstrap.redirect_to, authFlow);

    localStorage.setItem('kazix_magic_link_complete', '1');
    localStorage.setItem('kazix_auth_next_page', nextPage);
    localStorage.setItem('kazix_auth_flow', authFlow);

    document.getElementById('icon').textContent  = '✅';
    document.getElementById('title').textContent = authFlow === 'login' ? "You're signed in!" : 'Email confirmed!';
    document.getElementById('sub').textContent   = getSuccessMessage(nextPage, authFlow);
    document.getElementById('spinner').style.display = 'none';

    // ── TRY METHOD 1: Direct window.opener handoff (email links open new tabs) ──
    // This is the preferred method for magic links because Supabase redirects open new tabs
    if (handOffViaWindowOpener(session, bootstrap, authFlow)) {
      return;
    }

    // ── FALLBACK METHOD 2: localStorage heartbeat (for same-tab flows or if opener unavailable) ──
    if (shouldHandOffToOriginalTab(authFlow)) {
      handOffToOriginalTab(nextPage, authFlow);
      return;
    }

    // ── FALLBACK METHOD 3: Direct redirect (no original tab, so redirect here) ──
    setTimeout(() => { window.location.href = nextPage; }, 800);

  } catch (err) {
    console.error('[Auth Callback] ✗ Error during callback:', err.message, err);
    showError(toDisplayError(err, 'Unable to confirm your email. Please try again.'));
  }
}

if (!isCanonicalRedirectPending) {
  configureFlowUi(authFlow);
  if (SUPABASE_CONFIG_ERROR) {
    console.error(SUPABASE_CONFIG_ERROR);
    showError(SUPABASE_CONFIG_ERROR);
  } else {
    handleCallback();
  }
}
</script>
</body>
</html>
