<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,600&display=swap">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Choose a new password — KaziX</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<style>
  :root{--ink:#0D0D0D;--cream:#F5F0E8;--saffron:#F5A623;--rust:#C0392B;--green:#1B6B3A;--steel:#2C3E50;--muted:#7A7468;--card-bg:#FFFFFF;--border:rgba(13,13,13,0.1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;min-height:var(--app-viewport-height)}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.35}

  /* PAGE LAYOUT */
  .reset-page{display:flex;align-items:center;justify-content:center;min-height:var(--app-viewport-height);padding:calc(2rem + env(safe-area-inset-top)) max(1rem, calc(env(safe-area-inset-right) + 0.5rem)) calc(2rem + env(safe-area-inset-bottom)) max(1rem, calc(env(safe-area-inset-left) + 0.5rem))}
  
  /* CARD */
  .reset-card{background:var(--card-bg);padding:3rem 2.5rem;border-radius:6px;max-width:420px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.08);animation:slideUp 0.5s ease both}
  .reset-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.75rem;letter-spacing:-0.04em;margin-bottom:0.5rem}
  .reset-sub{font-size:0.95rem;color:var(--muted);margin-bottom:2rem;line-height:1.6}
  
  /* FORM */
  .reset-form .field-group{margin-bottom:1.5rem}
  .reset-form .field-label{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;display:block}
  .reset-form .field-input{width:100%;padding:0.9rem 1rem;border:1.5px solid var(--border);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.95rem;background:white;color:var(--ink);outline:none;transition:border-color 0.2s,background 0.2s}
  .reset-form .field-input:focus{border-color:var(--ink);background:white}
  .reset-form .field-input::placeholder{color:var(--muted)}
  
  /* BUTTON */
  .reset-btn{width:100%;padding:0.95rem;background:var(--saffron);color:var(--ink);font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;border:none;border-radius:2px;cursor:pointer;transition:background 0.2s;margin-top:0.5rem}
  .reset-btn:hover:not(:disabled){background:#e69400}
  .reset-btn:disabled{opacity:0.6;cursor:not-allowed}
  
  /* MESSAGE */
  .reset-msg{margin-top:1.5rem;padding:1rem;border-radius:2px;display:none;font-size:0.875rem;line-height:1.6}
  .reset-msg.ok{background:rgba(27,107,58,0.08);color:var(--green);display:block}
  .reset-msg.err{background:rgba(192,57,43,0.08);color:var(--rust);display:block}
  
  /* FOOTER */
  .reset-footer{margin-top:2rem;text-align:center;font-size:0.875rem}
  .reset-footer a{color:var(--ink);font-weight:600;text-decoration:none;transition:color 0.2s}
  .reset-footer a:hover{color:var(--green)}

  @media(max-width:640px){
    .reset-card{padding:2rem 1.5rem}
    .reset-title{font-size:1.5rem}
  }
</style>
</head>
<body>
  <div class="reset-page">
    <div class="reset-card">
      <h1 class="reset-title">Choose a new password</h1>
      <p class="reset-sub">Make it at least 8 characters. Once it's saved, you'll head back to sign in with the new password.</p>
      <form id="resetForm" class="reset-form">
        <div class="field-group">
          <label class="field-label">New password</label>
          <input class="field-input" id="password" type="password" minlength="8" required autocomplete="new-password" placeholder="••••••••" />
        </div>
        <div class="field-group">
          <label class="field-label">Confirm password</label>
          <input class="field-input" id="confirm" type="password" minlength="8" required autocomplete="new-password" placeholder="••••••••" />
        </div>
        <button type="submit" id="submitBtn" class="reset-btn">Update password</button>
      </form>
      <div id="msg" class="reset-msg"></div>
      <div class="reset-footer">
        <a href="/pages/login.html">Back to sign in</a>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = 'https://kazix.onrender.com';
    const form = document.getElementById('resetForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    function getCallbackParams() {
      const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(hash);
      hashParams.forEach((value, key) => {
        params.set(key, value);
      });
      return Object.fromEntries(params.entries());
    }
    const params = getCallbackParams();
    const tokenHash = params.token_hash;
    const accessToken = params.access_token;
    const refreshToken = params.refresh_token;
    const type = params.type;
    if ((!tokenHash && !(accessToken && refreshToken)) || type !== 'recovery') {
      msg.className = 'reset-msg err';
      msg.textContent = 'This reset link is invalid or has already been used. Please request a new one.';
      btn.disabled = true;
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        msg.className = 'reset-msg err';
        msg.textContent = 'Passwords do not match.';
        return;
      }
      msg.className = 'reset-msg';
      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        const payload = tokenHash
          ? { token_hash: tokenHash, new_password: password }
          : { access_token: accessToken, refresh_token: refreshToken, new_password: password };
        const res = await fetch(`${API_BASE}/v1/auth/email/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Reset failed.');
        msg.className = 'reset-msg ok';
        msg.textContent = data.message || 'Password updated. Redirecting…';
        setTimeout(() => { window.location.href = '/pages/login.html'; }, 1800);
      } catch (err) {
        msg.className = 'reset-msg err';
        msg.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Update password';
      }
    });
  </script>
</body>
</html>
