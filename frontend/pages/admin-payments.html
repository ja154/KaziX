<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,600&display=swap">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Admin Payments - KaziX</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<style>
.ledger-filters{display:flex;flex-wrap:wrap;gap:0.65rem;align-items:center;margin-bottom:1rem}
.ledger-filters select,.ledger-filters input[type="date"]{border:1.5px solid var(--border);border-radius:2px;padding:0.55rem 0.7rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;background:white;color:var(--ink)}
.ledger-filters .search-input{min-width:260px}

.table-wrap{overflow-x:auto}
.table td,.table th{padding-right:0.85rem;white-space:nowrap}
.table td:nth-child(4){white-space:normal;min-width:220px}

.payment-type{font-weight:700;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--steel)}
.status-chip{display:inline-flex;align-items:center;padding:0.2rem 0.55rem;border-radius:999px;font-size:0.66rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.status-chip.held{background:rgba(245,166,35,0.15);color:#A1610C}
.status-chip.completed{background:rgba(27,107,58,0.14);color:var(--green)}
.status-chip.refunded{background:rgba(192,57,43,0.14);color:var(--rust)}
.status-chip.pending{background:rgba(44,62,80,0.12);color:var(--steel)}

.row-actions{display:flex;gap:0.45rem;align-items:center}
.row-action-btn{display:inline-flex;align-items:center;padding:0.32rem 0.62rem;border-radius:2px;border:none;font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;cursor:pointer}
.row-action-btn.release{background:var(--green);color:#F5F0E8}
.row-action-btn.refund{background:var(--rust);color:#F5F0E8}
.row-action-btn.muted{background:transparent;color:var(--muted);border:1px solid var(--border)}

.pagination{display:flex;justify-content:space-between;align-items:center;gap:0.75rem;padding-top:0.9rem;border-top:1px solid var(--border);margin-top:0.9rem}
.page-buttons{display:flex;gap:0.4rem}
.page-btn{padding:0.38rem 0.68rem;border-radius:2px;border:1px solid var(--border);background:white;font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer}
.page-btn.active{background:var(--ink);color:#F5F0E8;border-color:var(--ink)}

@media(max-width:760px){
  .ledger-filters .search-input{min-width:100%}
}
</style>
</head>
<body data-admin-active="payments">
<main class="main" data-admin-main>
  <div class="admin-header">
    <div>
      <div class="page-title">Payments Ledger</div>
      <div class="page-sub">Complete transaction history across escrow holds, releases, and refunds.</div>
    </div>
    <div class="admin-actions">
      <button class="btn">Export CSV</button>
      <button class="btn primary">Create payout batch</button>
    </div>
  </div>

  <section class="panel" id="escrow-holds">
    <div class="panel-head">
      <div class="panel-title">Transaction Ledger</div>
      <span class="pill">All users</span>
    </div>
    <div class="panel-body">
      <div class="ledger-filters">
        <select aria-label="Filter by type">
          <option>All types</option>
          <option>Escrow</option>
          <option>Release</option>
          <option>Refund</option>
        </select>
        <select aria-label="Filter by status">
          <option>All statuses</option>
          <option>Held</option>
          <option>Completed</option>
          <option>Pending</option>
          <option>Refunded</option>
        </select>
        <input type="date" aria-label="Start date">
        <input type="date" aria-label="End date">
        <input class="search-input" type="search" placeholder="Search by ref, client, or fundi name">
        <button class="btn">Apply</button>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Ref</th>
              <th>Client</th>
              <th>Fundi</th>
              <th>Job</th>
              <th>Amount (KES)</th>
              <th>Type</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="paymentsTableBody">
  <tr><td colspan="8" style="text-align:center;padding:2rem;color:#888">Loading transactions…</td></tr>
</tbody>
        </table>
      </div>

      <div class="pagination">
        <div style="font-size:0.76rem;color:var(--muted)">Showing 1-10 of 326 transactions</div>
        <div class="page-buttons">
          <button class="page-btn">Prev</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">4</button>
          <button class="page-btn">Next</button>
        </div>
      </div>
    </div>
  </section>
</main>

<script src="../assets/js/profile-utils.js"></script>
<script src="../assets/js/admin-shell.js" defer></script>
<script>
(async function loadAdminPayments() {
  var helpers = window.KazixProfile;
  var tbody = document.getElementById('paymentsTableBody');
  if (!helpers || !tbody) return;
  try {
    var data = await helpers.requestJson('/v1/admin/payments', { auth: true });
    var rows = Array.isArray(data) ? data : (data.payments || data.results || []);
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#888">No transactions yet.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(function(p) {
      var e = helpers.escapeHtml;
      return '<tr>'
        + '<td>' + e(p.id ? String(p.id).slice(0,8).toUpperCase() : '—') + '</td>'
        + '<td>' + e(p.payer_name || p.client_name || '—') + '</td>'
        + '<td>' + e(p.payee_name || p.worker_name || '—') + '</td>'
        + '<td>' + e(p.job_title || '—') + '</td>'
        + '<td>' + e(helpers.formatCurrency ? helpers.formatCurrency(p.amount) : ('KES ' + (p.amount || 0))) + '</td>'
        + '<td>' + e(helpers.formatCurrency ? helpers.formatCurrency(p.platform_fee) : '') + '</td>'
        + '<td><span style="background:#E8F5E920;color:#1B5E20;padding:.15rem .5rem;border-radius:4px;font-size:.8rem">' + e(p.status || 'completed') + '</span></td>'
        + '<td>' + e(p.created_at ? new Date(p.created_at).toLocaleDateString() : '—') + '</td>'
        + '</tr>';
    }).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:1rem;color:#B71C1C">Could not load payments. Refresh to retry.</td></tr>';
  }
})();
</script>
</body>
</html>
