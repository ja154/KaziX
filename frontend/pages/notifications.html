<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Notifications — KaziX</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<style>
.page-head{margin-bottom:1.6rem}
.notif-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.35rem;flex-wrap:wrap;gap:0.75rem}
.notif-filters{display:flex;gap:0.4rem;flex-wrap:wrap}
.nf-btn{padding:0.45rem 0.95rem;border-radius:2px;border:1.5px solid var(--border);background:white;font-family:'Syne',sans-serif;font-weight:700;font-size:0.74rem;cursor:pointer;transition:all 0.2s;color:var(--muted)}
.nf-btn:hover{border-color:var(--ink);color:var(--ink)}
.nf-btn.active{background:var(--ink);color:#F5F0E8;border-color:var(--ink)}
.mark-all-btn{font-size:0.78rem;color:var(--rust);background:none;border:none;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif}
.mark-all-btn:hover{text-decoration:underline}
.page-status{display:none;padding:0.85rem 0.95rem;border-radius:4px;margin-bottom:1rem;font-size:0.8rem;line-height:1.55}
.page-status.open{display:block}
.page-status.info{background:rgba(13,13,13,0.04);color:var(--ink);border:1px solid rgba(13,13,13,0.08)}
.page-status.error{background:rgba(192,57,43,0.08);color:var(--rust);border:1px solid rgba(192,57,43,0.18)}
.notif-groups{display:flex;flex-direction:column;gap:1.7rem}
.notif-group{display:flex;flex-direction:column;gap:0.55rem}
.group-label{font-size:0.68rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding-left:0.1rem}
.notif-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.15rem;background:white;border:1px solid var(--border);border-radius:6px;transition:all 0.2s;position:relative}
.notif-item:hover{box-shadow:0 6px 24px rgba(0,0,0,0.05);transform:translateY(-1px)}
.notif-item.unread{border-left:3px solid var(--saffron);background:rgba(245,166,35,0.03)}
.ni-bubble{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.08rem;flex-shrink:0;border:1px solid rgba(13,13,13,0.08)}
.nib-applications{background:rgba(245,166,35,0.12)}
.nib-jobs{background:rgba(13,13,13,0.07)}
.nib-payments{background:rgba(27,107,58,0.1)}
.nib-messages{background:rgba(13,13,13,0.08)}
.nib-system{background:rgba(192,57,43,0.08)}
.ni-content{flex:1;min-width:0}
.ni-title{font-size:0.89rem;font-weight:700;color:var(--ink);margin-bottom:0.18rem;line-height:1.4}
.ni-sub{font-size:0.78rem;color:var(--muted);line-height:1.55}
.ni-meta{display:flex;align-items:center;gap:0.55rem;flex-wrap:wrap;margin-top:0.55rem}
.ni-time{font-size:0.68rem;color:var(--muted)}
.ni-tag{display:inline-flex;align-items:center;padding:0.22rem 0.55rem;border-radius:999px;background:rgba(13,13,13,0.06);color:var(--ink);font-size:0.64rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.ni-actions{display:flex;gap:0.45rem;margin-top:0.7rem;flex-wrap:wrap}
.nia-btn{padding:0.38rem 0.8rem;font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;border-radius:2px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:0.3rem}
.nia-primary{background:var(--ink);color:#F5F0E8;border:none}
.nia-primary:hover{background:var(--green)}
.nia-secondary{background:transparent;color:var(--ink);border:1px solid var(--border)}
.nia-secondary:hover{border-color:var(--ink)}
.unread-indicator{width:8px;height:8px;border-radius:50%;background:var(--saffron);flex-shrink:0;margin-top:6px}
.dismiss-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.95rem;padding:0.15rem 0.2rem;flex-shrink:0;opacity:0.65;transition:opacity 0.2s}
.dismiss-btn:hover{opacity:1;color:var(--rust)}
.state-card{background:white;border:1px solid var(--border);border-radius:8px;padding:2.3rem 1.5rem;text-align:center}
.state-icon{font-size:2.7rem;opacity:0.45;margin-bottom:0.8rem}
.state-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:var(--ink);margin-bottom:0.4rem}
.state-sub{font-size:0.84rem;color:var(--muted);line-height:1.65;max-width:420px;margin:0 auto}
@media(max-width:900px){.sidebar{display:none}.app-shell{padding-bottom:76px}}
@media(max-width:720px){.notif-item{padding:0.95rem 1rem}.notif-controls{align-items:flex-start}}
</style>
<style id="auth-gate-style">body{visibility:hidden}</style>
<script>
(function(){
  if (!localStorage.getItem("kazix_access_token")) {
    var next = encodeURIComponent(location.pathname + location.search);
    location.replace("login.html?next=" + next);
    return;
  }
  document.addEventListener("DOMContentLoaded", function(){
    var s = document.getElementById("auth-gate-style");
    if (s) s.remove();
  });
})();
</script>
</head>
<body class="app">
<nav class="topnav">
  <a href="index.html" class="logo">Kazi<span>X</span></a>
  <div class="topnav-right">
    <button class="notif-btn" type="button">🔔<span class="notif-dot"></span></button>
    <div class="user-chip"><div class="user-avatar">KX</div><span class="user-name">My account</span></div>
  </div>
</nav>

<div class="app-shell">
  <aside class="sidebar" id="appSidebar"></aside>

  <main class="main">
    <div class="page-head">
      <div class="page-title">Notifications</div>
      <div class="page-sub">Applications, hires, payments, and messages now update from the live service.</div>
    </div>

    <div class="page-status info" id="pageStatus"></div>

    <div class="notif-controls">
      <div class="notif-filters" id="notifFilters">
        <button class="nf-btn active" type="button" data-filter="all">All</button>
        <button class="nf-btn" type="button" data-filter="applications">Applications</button>
        <button class="nf-btn" type="button" data-filter="jobs">Jobs</button>
        <button class="nf-btn" type="button" data-filter="payments">Payments</button>
        <button class="nf-btn" type="button" data-filter="messages">Messages</button>
        <button class="nf-btn" type="button" data-filter="system">System</button>
      </div>
      <button class="mark-all-btn" id="markAllReadButton" type="button">Mark all as read</button>
    </div>

    <div class="notif-groups" id="notificationsList">
      <div class="state-card">
        <div class="state-icon">⏳</div>
        <div class="state-title">Loading notifications…</div>
        <div class="state-sub">Pulling the latest updates from your live account activity.</div>
      </div>
    </div>
  </main>
</div>

<nav class="mobile-nav" id="mobileNav" aria-label="Primary navigation"></nav>

<script src="../assets/js/profile-utils.js"></script>
<script>
const APP_NAV = {
  client: {
    sections: [
      {
        title: 'Main',
        items: [
          { href: 'client-dashboard.html', icon: '📊', label: 'Dashboard' },
          { href: 'my-jobs.html', icon: '📋', label: 'My Jobs' },
          { href: 'job-applicants.html', icon: '👥', label: 'Applications' },
          { href: 'my-hires.html', icon: '🤝', label: 'My Hires' },
        ],
      },
      {
        title: 'Account',
        items: [
          { href: 'notifications.html', icon: '🔔', label: 'Notifications', active: true },
          { href: 'messages.html', icon: '💬', label: 'Messages' },
          { href: 'client-profile.html', icon: '👤', label: 'My Profile' },
        ],
      },
    ],
    mobile: [
      { href: 'client-dashboard.html', icon: '📊', label: 'Dashboard' },
      { href: 'my-jobs.html', icon: '📋', label: 'Jobs' },
      { href: 'notifications.html', icon: '🔔', label: 'Alerts', active: true },
      { href: 'messages.html', icon: '💬', label: 'Messages' },
    ],
    accountIcon: '🏠',
  },
  fundi: {
    sections: [
      {
        title: 'Work',
        items: [
          { href: 'worker-dashboard.html', icon: '📊', label: 'Dashboard' },
          { href: 'worker-jobs.html', icon: '🔍', label: 'Find Jobs' },
          { href: 'my-applications.html', icon: '📋', label: 'My Applications' },
          { href: 'worker-hires.html', icon: '🤝', label: 'Active Contracts' },
        ],
      },
      {
        title: 'Account',
        items: [
          { href: 'notifications.html', icon: '🔔', label: 'Notifications', active: true },
          { href: 'messages.html', icon: '💬', label: 'Messages' },
          { href: 'worker-profile-edit.html', icon: '👤', label: 'My Profile' },
        ],
      },
    ],
    mobile: [
      { href: 'worker-dashboard.html', icon: '📊', label: 'Dashboard' },
      { href: 'worker-jobs.html', icon: '🔍', label: 'Jobs' },
      { href: 'notifications.html', icon: '🔔', label: 'Alerts', active: true },
      { href: 'messages.html', icon: '💬', label: 'Messages' },
    ],
    accountIcon: '🔧',
  },
  admin: {
    sections: [
      {
        title: 'Admin',
        items: [
          { href: 'admin-dashboard.html', icon: '🛡️', label: 'Dashboard' },
          { href: 'notifications.html', icon: '🔔', label: 'Notifications', active: true },
          { href: 'messages.html', icon: '💬', label: 'Messages' },
        ],
      },
    ],
    mobile: [
      { href: 'admin-dashboard.html', icon: '🛡️', label: 'Admin' },
      { href: 'notifications.html', icon: '🔔', label: 'Alerts', active: true },
      { href: 'messages.html', icon: '💬', label: 'Messages' },
      { href: 'index.html', icon: '🏠', label: 'Home' },
    ],
    accountIcon: '🛡️',
  },
};

const CATEGORY_META = {
  applications: { icon: '👥', bubbleClass: 'nib-applications' },
  jobs: { icon: '📋', bubbleClass: 'nib-jobs' },
  payments: { icon: '💳', bubbleClass: 'nib-payments' },
  messages: { icon: '💬', bubbleClass: 'nib-messages' },
  system: { icon: '⚙️', bubbleClass: 'nib-system' },
};

let currentRole = 'client';
let notificationsState = [];
let activeFilter = 'all';

function escapeHtml(value) {
  return window.KazixProfile.escapeHtml(value);
}

function renderSidebar(role) {
  const config = APP_NAV[role] || APP_NAV.client;
  document.getElementById('appSidebar').innerHTML = `
    ${config.sections.map((section) => `
      <div class="sidebar-section">${escapeHtml(section.title)}</div>
      ${section.items.map((item) => `
        <a class="nav-item${item.active ? ' active' : ''}" href="${escapeHtml(item.href)}">
          <span class="ni-icon">${item.icon}</span>${escapeHtml(item.label)}
        </a>
      `).join('')}
    `).join('')}
    <div class="sidebar-bottom">
      <div class="sidebar-profile">
        <div class="sp-avatar">${config.accountIcon}</div>
        <div>
          <div class="sp-name">My account</div>
          <div class="sp-role">${escapeHtml(role)} account</div>
        </div>
      </div>
    </div>
  `;
}

function renderMobileNav(role) {
  const config = APP_NAV[role] || APP_NAV.client;
  document.getElementById('mobileNav').innerHTML = config.mobile.map((item) => `
    <a class="mobile-nav-item${item.active ? ' active' : ''}" href="${escapeHtml(item.href)}">
      <span class="mn-icon">${item.icon}</span><span class="mn-label">${escapeHtml(item.label)}</span>
    </a>
  `).join('');
}

function setPageStatus(message, tone) {
  const box = document.getElementById('pageStatus');
  if (!message) {
    box.className = 'page-status info';
    box.textContent = '';
    return;
  }
  box.className = `page-status ${tone || 'info'} open`;
  box.textContent = message;
}

function notificationCategory(notification) {
  const type = String(notification?.type || '').toLowerCase();
  if (type.includes('message')) return 'messages';
  if (type.includes('payment') || type.includes('escrow')) return 'payments';
  if (type.includes('job')) return 'jobs';
  if (type.includes('application') || type.includes('hired')) return 'applications';
  return 'system';
}

function actionLabel(notification, category) {
  if (category === 'messages') return 'Open Chat';
  if (category === 'payments') return 'View Payment';
  if (category === 'applications') return 'Review';
  if (category === 'jobs') return 'Open Job';
  return 'Open';
}

function formatRelativeTime(value) {
  if (!value) return '';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '';
  const diffMs = Date.now() - date.getTime();
  const diffMins = Math.floor(diffMs / 60000);
  if (diffMins < 1) return 'Just now';
  if (diffMins < 60) return `${diffMins} minutes ago`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `${diffHours} hour${diffHours === 1 ? '' : 's'} ago`;
  const diffDays = Math.floor(diffHours / 24);
  if (diffDays < 7) return `${diffDays} day${diffDays === 1 ? '' : 's'} ago`;
  return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function dateGroupLabel(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return 'Earlier';
  const today = new Date();
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const itemStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((todayStart.getTime() - itemStart.getTime()) / 86400000);
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return 'Earlier This Week';
  return date.toLocaleDateString(undefined, { month: 'long', day: 'numeric' });
}

function filteredNotifications() {
  return notificationsState.filter((notification) => {
    if (activeFilter === 'all') return true;
    return notificationCategory(notification) === activeFilter;
  });
}

function renderEmptyState(message) {
  document.getElementById('notificationsList').innerHTML = `
    <div class="state-card">
      <div class="state-icon">🔔</div>
      <div class="state-title">All caught up</div>
      <div class="state-sub">${escapeHtml(message || 'No notifications in this section right now.')}</div>
    </div>
  `;
}

function renderNotifications() {
  const visible = filteredNotifications();
  if (!visible.length) {
    renderEmptyState(activeFilter === 'all' ? 'You do not have any notifications yet.' : 'No notifications match this filter right now.');
    return;
  }

  const groups = [];
  let currentGroup = '';
  visible.forEach((notification) => {
    const label = dateGroupLabel(notification.created_at);
    if (label !== currentGroup) {
      currentGroup = label;
      groups.push({ label, items: [] });
    }
    groups[groups.length - 1].items.push(notification);
  });

  document.getElementById('notificationsList').innerHTML = groups.map((group) => `
    <section class="notif-group">
      <div class="group-label">${escapeHtml(group.label)}</div>
      ${group.items.map((notification) => {
        const category = notificationCategory(notification);
        const meta = CATEGORY_META[category] || CATEGORY_META.system;
        const actionUrl = notification.action_url || null;
        return `
          <article class="notif-item${notification.read ? '' : ' unread'}" data-id="${escapeHtml(notification.id)}">
            <div class="ni-bubble ${meta.bubbleClass}">${meta.icon}</div>
            <div class="ni-content">
              <div class="ni-title">${escapeHtml(notification.title || 'Notification')}</div>
              <div class="ni-sub">${escapeHtml(notification.body || '')}</div>
              <div class="ni-meta">
                <span class="ni-tag">${escapeHtml(category)}</span>
                <span class="ni-time">${escapeHtml(formatRelativeTime(notification.created_at))}</span>
              </div>
              <div class="ni-actions">
                ${actionUrl ? `<a href="${escapeHtml(actionUrl)}" class="nia-btn nia-primary" data-action="open" data-id="${escapeHtml(notification.id)}">${escapeHtml(actionLabel(notification, category))}</a>` : ''}
                <button class="nia-btn nia-secondary" type="button" data-action="toggle-read" data-id="${escapeHtml(notification.id)}">${notification.read ? 'Mark Unread' : 'Mark Read'}</button>
              </div>
            </div>
            ${notification.read ? '' : '<div class="unread-indicator"></div>'}
            <button class="dismiss-btn" type="button" data-action="dismiss" data-id="${escapeHtml(notification.id)}" aria-label="Dismiss notification">✕</button>
          </article>
        `;
      }).join('')}
    </section>
  `).join('');
}

async function fetchNotifications() {
  const payload = await window.KazixProfile.requestJson('/v1/notifications', {
    auth: true,
    showError: false,
  });
  notificationsState = Array.isArray(payload?.data) ? payload.data : [];
}

async function updateNotificationRead(notificationId, readValue) {
  const updated = await window.KazixProfile.requestJson(`/v1/notifications/${encodeURIComponent(notificationId)}`, {
    auth: true,
    method: 'PATCH',
    body: { read: readValue },
    showError: false,
  });
  notificationsState = notificationsState.map((notification) => (
    notification.id === notificationId
      ? { ...notification, ...updated, read: readValue }
      : notification
  ));
  renderNotifications();
}

async function markAllRead() {
  try {
    await window.KazixProfile.requestJson('/v1/notifications/read-all', {
      auth: true,
      method: 'POST',
      showError: false,
    });
    notificationsState = notificationsState.map((notification) => ({ ...notification, read: true }));
    renderNotifications();
    setPageStatus('All notifications marked as read.', 'info');
  } catch (error) {
    console.error('Failed to mark all notifications read', error);
    setPageStatus(error.message || 'Could not update notifications right now.', 'error');
  }
}

function bindEvents() {
  document.getElementById('notifFilters').addEventListener('click', function (event) {
    const button = event.target.closest('[data-filter]');
    if (!button) return;
    activeFilter = button.dataset.filter || 'all';
    document.querySelectorAll('#notifFilters .nf-btn').forEach((item) => {
      item.classList.toggle('active', item === button);
    });
    renderNotifications();
  });

  document.getElementById('markAllReadButton').addEventListener('click', markAllRead);

  document.getElementById('notificationsList').addEventListener('click', async function (event) {
    const target = event.target.closest('[data-action]');
    if (!target) return;
    const notificationId = target.dataset.id;
    const notification = notificationsState.find((item) => item.id === notificationId);
    if (!notification) return;

    const action = target.dataset.action;
    if (action === 'open' && !notification.read) {
      try {
        await updateNotificationRead(notificationId, true);
      } catch (_error) {
        // Let navigation continue even if the read sync fails.
      }
      return;
    }

    if (action === 'toggle-read') {
      event.preventDefault();
      try {
        await updateNotificationRead(notificationId, !notification.read);
        setPageStatus('', 'info');
      } catch (error) {
        console.error('Failed to toggle notification state', error);
        setPageStatus(error.message || 'Could not update that notification right now.', 'error');
      }
      return;
    }

    if (action === 'dismiss') {
      event.preventDefault();
      try {
        await updateNotificationRead(notificationId, true);
        notificationsState = notificationsState.filter((item) => item.id !== notificationId);
        renderNotifications();
      } catch (error) {
        console.error('Failed to dismiss notification', error);
        setPageStatus(error.message || 'Could not dismiss that notification right now.', 'error');
      }
    }
  });
}

async function initNotificationsPage() {
  try {
    const shellData = await window.KazixProfile.getMyProfile();
    currentRole = shellData?.profile?.role || 'client';
    renderSidebar(currentRole);
    renderMobileNav(currentRole);
    await window.KazixProfile.hydrateShell({ data: shellData, silent: false });
    bindEvents();
    await fetchNotifications();
    renderNotifications();
  } catch (error) {
    console.error('Failed to initialize notifications page', error);
    setPageStatus(error.message || 'Could not load notifications right now.', 'error');
    renderEmptyState(error.message || 'Try refreshing again in a moment.');
  }
}

document.addEventListener('DOMContentLoaded', initNotificationsPage);
</script>
</body>
</html>
