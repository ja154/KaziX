<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset your password — KaziX</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; background:#F7F5F2; margin:0; min-height:100vh;
           display:flex; align-items:center; justify-content:center; padding:1rem; color:#0D0D0D; }
    .card { background:#fff; padding:2rem; border-radius:16px; max-width:420px; width:100%;
            box-shadow:0 10px 30px rgba(0,0,0,.06); }
    h1 { font-family:'Syne', serif; margin:0 0 .5rem; }
    p { color:#555; margin-top:0; }
    label { display:block; font-weight:600; margin:1rem 0 .35rem; }
    input { width:100%; padding:.85rem 1rem; border:1px solid #ddd; border-radius:10px; font:inherit; box-sizing:border-box; }
    button { width:100%; margin-top:1.25rem; background:#F5A623; color:#0D0D0D; border:0;
             padding:.95rem; border-radius:10px; font-weight:700; cursor:pointer; font:inherit; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .msg { margin-top:1rem; padding:.85rem 1rem; border-radius:10px; display:none; }
    .msg.ok { background:#E8F5E9; color:#1B5E20; display:block; }
    .msg.err { background:#FDECEA; color:#B71C1C; display:block; }
    .links { margin-top:1.25rem; text-align:center; font-size:.95rem; }
    .links a { color:#0D0D0D; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot your password?</h1>
    <p>Enter the email tied to your KaziX account and we'll send you a reset link.</p>
    <form id="forgotForm">
      <label for="email">Email address</label>
      <input id="email" type="email" required autocomplete="email" />
      <button type="submit" id="submitBtn">Send reset link</button>
    </form>
    <div id="msg" class="msg"></div>
    <div class="links">
      <a href="/pages/login.html">Back to sign in</a>
    </div>
  </div>
  <script>
    const API_BASE = 'https://kazix.onrender.com';
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      msg.className = 'msg';
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch(`${API_BASE}/v1/auth/email/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            redirect_to: `${window.location.origin}/pages/reset-password.html`,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Something went wrong.');
        msg.className = 'msg ok';
        msg.textContent = data.message || 'Check your email for a reset link.';
        form.reset();
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
