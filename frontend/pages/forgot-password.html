<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,600&display=swap">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<title>Reset your password — KaziX</title>
<link rel="stylesheet" href="../assets/css/styles.css">
<style>
  :root{--ink:#0D0D0D;--cream:#F5F0E8;--saffron:#F5A623;--rust:#C0392B;--green:#1B6B3A;--steel:#2C3E50;--muted:#7A7468;--card-bg:#FFFFFF;--border:rgba(13,13,13,0.1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;min-height:var(--app-viewport-height)}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.35}

  /* PAGE LAYOUT */
  .forgot-page{display:flex;align-items:center;justify-content:center;min-height:var(--app-viewport-height);padding:calc(2rem + env(safe-area-inset-top)) max(1rem, calc(env(safe-area-inset-right) + 0.5rem)) calc(2rem + env(safe-area-inset-bottom)) max(1rem, calc(env(safe-area-inset-left) + 0.5rem))}
  
  /* CARD */
  .forgot-card{background:var(--card-bg);padding:3rem 2.5rem;border-radius:6px;max-width:420px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.08);animation:slideUp 0.5s ease both}
  .forgot-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.75rem;letter-spacing:-0.04em;margin-bottom:0.5rem}
  .forgot-sub{font-size:0.95rem;color:var(--muted);margin-bottom:2rem;line-height:1.6}
  
  /* FORM */
  .forgot-form .field-group{margin-bottom:1.5rem}
  .forgot-form .field-label{font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;display:block}
  .forgot-form .field-input{width:100%;padding:0.9rem 1rem;border:1.5px solid var(--border);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:0.95rem;background:white;color:var(--ink);outline:none;transition:border-color 0.2s,background 0.2s}
  .forgot-form .field-input:focus{border-color:var(--ink);background:white}
  .forgot-form .field-input::placeholder{color:var(--muted)}
  
  /* BUTTON */
  .forgot-btn{width:100%;padding:0.95rem;background:var(--saffron);color:var(--ink);font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;border:none;border-radius:2px;cursor:pointer;transition:background 0.2s;margin-top:0.5rem}
  .forgot-btn:hover:not(:disabled){background:#e69400}
  .forgot-btn:disabled{opacity:0.6;cursor:not-allowed}
  
  /* MESSAGE */
  .forgot-msg{margin-top:1.5rem;padding:1rem;border-radius:2px;display:none;font-size:0.875rem;line-height:1.6}
  .forgot-msg.ok{background:rgba(27,107,58,0.08);color:var(--green);display:block}
  .forgot-msg.err{background:rgba(192,57,43,0.08);color:var(--rust);display:block}
  
  /* FOOTER */
  .forgot-footer{margin-top:2rem;text-align:center;font-size:0.875rem}
  .forgot-footer a{color:var(--ink);font-weight:600;text-decoration:none;transition:color 0.2s}
  .forgot-footer a:hover{color:var(--green)}

  @media(max-width:640px){
    .forgot-card{padding:2rem 1.5rem}
    .forgot-title{font-size:1.5rem}
  }
</style>
</head>
<body>
  <div class="forgot-page">
    <div class="forgot-card">
      <h1 class="forgot-title">Forgot your password?</h1>
      <p class="forgot-sub">Enter the email tied to your KaziX account and we'll send you a reset link.</p>
      <form id="forgotForm" class="forgot-form">
        <div class="field-group">
          <label class="field-label">Email address</label>
          <input class="field-input" id="email" type="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <button type="submit" id="submitBtn" class="forgot-btn">Send reset link</button>
      </form>
      <div id="msg" class="forgot-msg"></div>
      <div class="forgot-footer">
        <a href="/pages/login.html">Back to sign in</a>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = 'https://kazix.onrender.com';
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      msg.className = 'forgot-msg';
      msg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch(`${API_BASE}/v1/auth/email/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            redirect_to: `${window.location.origin}/pages/reset-password.html`,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || 'Something went wrong.');
        msg.className = 'forgot-msg ok';
        msg.textContent = data.message || 'Check your email for a reset link.';
        form.reset();
      } catch (err) {
        msg.className = 'forgot-msg err';
        msg.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
